name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python 3.10 CPU tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      MPLBACKEND: Agg
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            environment.yml
            .github/workflows/main.yml

      - name: Install CPU test dependencies
        env:
          MPLCONFIGDIR: ${{ runner.temp }}/matplotlib
        run: |
          mkdir -p "$MPLCONFIGDIR"
          python -m pip install --upgrade \
            pip==24.3.1 \
            setuptools==69.5.1 \
            wheel
          python -m pip install \
            --index-url https://download.pytorch.org/whl/cpu \
            torch==2.5.1
          python -m pip install \
            matplotlib==3.9.1 \
            numpy==1.26.4 \
            pandas==2.2.3 \
            Pillow==9.4.0 \
            plyfile==1.1 \
            pytest==8.3.5 \
            PyYAML==6.0.3
          python -m pip install --editable .

      - name: Run test suite
        env:
          MPLCONFIGDIR: ${{ runner.temp }}/matplotlib
        run: python -m pytest -ra
