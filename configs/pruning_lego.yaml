study:
  name: lego_pruning
  scene: lego
  iteration: 30000
  output_root: results/pruning/lego/study_30000

baseline:
  config: configs/baseline.yaml
  model_path: results/baseline/lego/seed_0
  source_path: data/nerf_synthetic/lego
  baseline_root: third_party/gaussian-splatting

dataset:
  test_views: 200
  resolution: 1
  white_background: true
  sh_degree: 3
  data_device: cpu

rendering:
  skip_train: true

evaluation:
  device: auto

profiling:
  warmup_views: 10
  repetitions: 3

pruning:
  random:
    keep_fractions:
      - 0.25
      - 0.5
      - 0.75
    seeds:
      - 0
  top-k:
    keep_fractions:
      - 0.25
      - 0.5
      - 0.75
  opacity-threshold:
    thresholds:
      - 0.1
      - 0.3
      - 0.5
