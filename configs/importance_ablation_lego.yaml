study:
  name: lego_importance_ablation
  scene: lego
  iteration: 30000
  output_root: results/importance_ablation/lego/study_30000

baseline:
  config: configs/baseline.yaml
  model_path: results/baseline/lego/seed_0
  source_path: data/nerf_synthetic/lego
  baseline_root: third_party/gaussian-splatting

dataset:
  test_views: 200
  resolution: 1
  white_background: true
  sh_degree: 3
  data_device: cpu

rendering:
  skip_train: true

evaluation:
  device: auto

profiling:
  warmup_views: 10
  repetitions: 3

pruning:
  top-k:
    keep_fractions:
      - 0.25
      - 0.5
      - 0.75
  visibility-top-k:
    keep_fractions:
      - 0.25
      - 0.5
      - 0.75
    importance_modes:
      - opacity_visibility
      - visibility
      - opacity_count
