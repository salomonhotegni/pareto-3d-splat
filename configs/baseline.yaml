experiment:
  name: baseline
  seed: 0

paths:
  baseline_root: third_party/gaussian-splatting
  source_path: data/nerf_synthetic/lego
  model_path: results/baseline/lego/seed_0

dataset:
  name: nerf_synthetic_lego
  format: nerf_synthetic
  train_views: 100
  validation_views: 100
  test_views: 200
  image_size:
    - 800
    - 800
  white_background: true
  resolution: 1
  sh_degree: 3
  data_device: cpu

training:
  iterations: 30000
  eval_split: true
  disable_viewer: true
  save_iterations:
    - 7000
    - 30000
  test_iterations:
    - 7000
    - 30000
  checkpoint_iterations:
    - 5000
    - 10000
    - 15000
    - 20000
    - 25000
    - 30000
  checkpoint_retention: 2
  checkpoint_poll_seconds: 30

rendering:
  iteration: 30000
  skip_train: true

evaluation:
  device: auto

profiling:
  warmup_views: 10
  repetitions: 3

metrics:
  quality:
    - psnr
    - ssim
    - lpips
  efficiency:
    - fps
    - model_size_mb
    - gaussian_count
    - peak_gpu_memory_mb
